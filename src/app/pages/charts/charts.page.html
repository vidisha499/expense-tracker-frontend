
<ion-header class="ion-no-border midnight-header" style="height: calc(65px + var(--ion-safe-area-top));">
  <ion-toolbar style="--padding-top: calc(10px + var(--ion-safe-area-top));">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="light" text=""></ion-back-button>
    </ion-buttons>
    <ion-title style="font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;">Analysis</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/home/reports" color="light">
        <ion-icon name="document-text-outline" slot="icon-only" style="font-size: 1.2rem;"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #020617;">
  <!-- Cyber Decorations -->
  <div class="midnight-hero-bg" style="height: 350px; background: linear-gradient(to bottom, #0f172a, #020617); position: absolute; width: 100%; top: 0; left: 0; z-index: 0; overflow: hidden;">
    <div class="glow-orb" style="width: 250px; height: 250px; top: -80px; right: -80px; opacity: 0.15; background: var(--primary-purple);"></div>
    <div class="glow-orb" style="width: 200px; height: 200px; top: 150px; left: -50px; opacity: 0.1; background: #06b6d4;"></div>
  </div>

  <div class="ion-padding fade-up" style="position: relative; z-index: 1;">
    
    <!-- Premium Chart Card -->
    <div class="glass-card chart-card-premium" style="padding: 30px 20px; margin-bottom: 30px; background: rgba(15, 23, 42, 0.6); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
      <div style="text-align: center; margin-bottom: 25px;">
        <h3 style="margin: 0; color: white; font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px;">Spending Breakdown</h3>
        <p style="margin: 5px 0 0; color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Visualizing your top categories</p>
      </div>
      
      <div style="position: relative; height: 300px; width: 100%; display: flex; align-items: center; justify-content: center;">
        <div class="chart-glow" style="position: absolute; width: 180px; height: 180px; background: rgba(139, 92, 246, 0.15); border-radius: 50%; filter: blur(40px); z-index: -1;"></div>
        <canvas id="expenseChart"></canvas>
      </div>
    </div>

    <!-- Category Details List -->
    <div class="legend-section">
      <div style="display: flex; align-items: center; justify-content: space-between; margin: 0 10px 18px 10px;">
        <h3 style="color: #94a3b8; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2.5px; margin: 0;">Category Details</h3>
        <ion-icon name="options-outline" style="color: #94a3b8; font-size: 1.1rem;"></ion-icon>
      </div>
      
      <ion-list lines="none" style="background: transparent;">
        <div *ngFor="let label of chartLabels; let i = index" 
             class="glass-card category-item-row" 
             style="margin-bottom: 14px; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease;">
          <div style="display: flex; align-items: center; width: 100%;">
            <!-- Icon with Minimal Style -->
            <div [style.background]="'rgba(' + getRGB(chartColors[i]) + ', 0.05)'" 
                 [style.border-color]="'rgba(' + getRGB(chartColors[i]) + ', 0.08)'"
                 style="width: 48px; height: 48px; border-radius: 16px; margin-right: 18px; border: 1px solid; display: flex; align-items: center; justify-content: center;">
              <ion-icon [name]="getIcon(label)" [style.color]="chartColors[i]" style="font-size: 1.4rem;"></ion-icon>
            </div>
            
            <ion-label style="flex: 1;">
              <h2 style="color: white; font-weight: 700; font-size: 1.05rem; margin: 0; letter-spacing: -0.2px;">{{ label }}</h2>
              <p style="color: #64748b; font-size: 0.75rem; font-weight: 600; margin-top: 2px;">{{ (chartValues[i] / totalAmount * 100) | number:'1.0-0' }}% of total</p>
            </ion-label>
            
            <div style="text-align: right;">
              <h2 style="color: white; font-weight: 800; font-size: 1.2rem; margin: 0; letter-spacing: -0.5px;">₹{{ chartValues[i] | number:'1.0-0' }}</h2>
            </div>
          </div>
        </div>
      </ion-list>
    </div>

    <!-- Info Pill -->
    <div style="margin-top: 30px; display: flex; justify-content: center;">
      <div style="background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px;">
        <ion-icon name="information-circle-outline" style="color: #94a3b8; font-size: 1rem;"></ion-icon>
        <span style="color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Click categories to highlight in chart</span>
      </div>
    </div>
  </div>
</ion-content>
