<ion-app>
  <ion-menu contentId="main-content" type="overlay" class="midnight-menu">
    <ion-content class="ion-no-padding" style="--background: #0f172a;">
      <!-- Premium Menu Header -->
      <div class="menu-header" (click)="openProfileModal()" style="cursor: pointer;">
        <div class="header-glow"></div>
        <div class="user-info">
          <div class="avatar-circle">
            <ion-icon name="person"></ion-icon>
          </div>
          <div class="user-text">
            <h2 style="font-size: 1.2rem; font-weight: 800;">Welcome Back</h2>
            <p style="color: var(--primary-purple); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">Premium Account</p>
          </div>
        </div>
      </div>

      <!-- Enhanced Menu List -->
      <ion-list lines="none" class="menu-list" style="background: transparent; padding-top: 20px;">
        <ion-menu-toggle auto-hide="false">
          
          <ion-item button routerLink="/home" routerDirection="root" class="menu-item">
            <div class="icon-box"><ion-icon name="grid-outline"></ion-icon></div>
            <ion-label style="font-weight: 700;">Dashboard</ion-label>
          </ion-item>
          
          <ion-item button routerLink="/category" class="menu-item">
            <div class="icon-box"><ion-icon name="layers-outline"></ion-icon></div>
            <ion-label style="font-weight: 700;">My Categories</ion-label>
          </ion-item>

          <ion-item button routerLink="/charts" class="menu-item">
            <div class="icon-box"><ion-icon name="bar-chart-outline"></ion-icon></div>
            <ion-label style="font-weight: 700;">Financial Analysis</ion-label>
          </ion-item>

          <ion-item button routerLink="/home/reports" class="menu-item">
            <div class="icon-box"><ion-icon name="document-text-outline"></ion-icon></div>
            <ion-label style="font-weight: 700;">Generate Reports</ion-label>
          </ion-item>

          <div style="height: 1px; background: rgba(255,255,255,0.05); margin: 15px 25px;"></div>

          <ion-item button (click)="openProfileModal()" class="menu-item">
            <div class="icon-box"><ion-icon name="person-circle-outline"></ion-icon></div>
            <ion-label style="font-weight: 700;">User Identity</ion-label>
          </ion-item>

          <ion-item button routerLink="/security" class="menu-item">
            <div class="icon-box"><ion-icon name="shield-checkmark-outline"></ion-icon></div>
            <ion-label style="font-weight: 700;">Security & Privacy</ion-label>
          </ion-item>

          <ion-item button routerLink="/goals" class="menu-item">
            <div class="icon-box"><ion-icon name="trophy-outline"></ion-icon></div>
            <ion-label style="font-weight: 700;">Savings Goals</ion-label>
          </ion-item>

        </ion-menu-toggle>
      </ion-list>

      <!-- Fixed Footer -->
      <div class="menu-footer" style="background: rgba(0,0,0,0.2);">
        <ion-button fill="clear" (click)="logout()" class="logout-btn" style="--color: #f43f5e; font-weight: 800; font-size: 0.95rem;">
          <ion-icon name="power-outline" slot="start" style="font-size: 1.2rem;"></ion-icon>
          Sign Out
        </ion-button>
      </div>
    </ion-content>
  </ion-menu>
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
