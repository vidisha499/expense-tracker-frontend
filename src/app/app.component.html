
<ion-app>
  <ion-menu side="start" contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="menu-content">
    
      <ion-list class="menu-list">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/category" class="menu-card">
            <ion-icon slot="start" name="pricetags-outline" color="white"></ion-icon>
            <ion-label>Category</ion-label>
          </ion-item>

          <ion-item class="menu-card" (click)="openProfileModal()">
            <ion-icon slot="start" name="person-circle-outline" color="white"></ion-icon>
            <ion-label>Profile</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>

    <div class="logout-container">
      <ion-item
        button
        class="menu-card logout-item"
        (click)="logout()"
        routerLink="/home/login"
        defaulthref="/home/login"
      >
        <ion-icon slot="start" name="log-out-outline" color="white"></ion-icon>
        <ion-label>Logout</ion-label>
      </ion-item>
    </div>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
