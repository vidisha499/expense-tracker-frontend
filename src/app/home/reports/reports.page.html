<ion-header class="ion-no-border">
  <ion-toolbar style="--background: #7b5cff"> 
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="white"></ion-back-button>
    </ion-buttons>
    <ion-title style="color: #ffffff">Generate Reports</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #f3efff">
  <div class="ion-padding">
    <div style="background: white; border-radius: 24px; padding: 15px; box-shadow: 0 4px 12px rgba(123, 92, 255, 0.08);">
      
      <ion-item lines="full" style="--background: transparent; margin-bottom: 10px;">
        <ion-label color="medium">Report Type</ion-label>
        <ion-select [(ngModel)]="reportType" interface="popover" color="tertiary">
          <ion-select-option value="all">All Transactions</ion-select-option>
          <ion-select-option value="expense">Expense Report</ion-select-option>
          <ion-select-option value="income">Income Report</ion-select-option>
          <ion-select-option value="category">By Category (Optional)</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item lines="full" *ngIf="reportType === 'category'" style="--background: transparent; margin-bottom: 10px;">
        <ion-label color="medium">Category</ion-label>
        <ion-select [(ngModel)]="selectedCategory" interface="popover" placeholder="All Categories">
          <ion-select-option value="">All Categories</ion-select-option>
          <ion-select-option *ngFor="let cat of categories" [value]="cat">
            {{ cat }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <div style="margin-top: 10px">
        <ion-item lines="none" id="start-date-trigger" button="true" detail="false" style="--background: transparent; margin-bottom: 5px;">
          <ion-label>From</ion-label>
          <ion-text slot="end" class="custom-date-display">
            {{ startDate | date:'mediumDate' }}
          </ion-text>
          
          <ion-popover trigger="start-date-trigger" #startPopover [dismissOnSelect]="false">
            <ng-template>
              <ion-datetime 
                presentation="date" 
                [(ngModel)]="startDate" 
                (ionChange)="startPopover.dismiss()"
                color="tertiary">
              </ion-datetime>
            </ng-template>
          </ion-popover>
        </ion-item>

        <ion-item lines="none" id="end-date-trigger" button="true" detail="false" style="--background: transparent; margin-bottom: 5px;">
          <ion-label>To</ion-label>
          <ion-text slot="end" class="custom-date-display">
            {{ endDate | date:'mediumDate' }}
          </ion-text>
          
          <ion-popover trigger="end-date-trigger" #endPopover [dismissOnSelect]="false">
            <ng-template>
              <ion-datetime 
                presentation="date" 
                [(ngModel)]="endDate" 
                (ionChange)="endPopover.dismiss()"
                color="tertiary">
              </ion-datetime>
            </ng-template>
          </ion-popover>
        </ion-item>
      </div>
    </div>

    <div style="margin-top: 30px">
      <ion-button expand="block" mode="ios" (click)="generatePDF()" style="--background: #7b5cff; height: 55px; font-weight: 700">
        <ion-icon name="document-text-outline" slot="start"></ion-icon> Export as PDF
      </ion-button>
      
      <ion-button expand="block" mode="ios" fill="outline" (click)="generateExcel()" style="--color: #7b5cff; --border-color: #7b5cff; height: 55px; margin-top: 15px; font-weight: 700;">
        <ion-icon name="grid-outline" slot="start"></ion-icon> Export as Excel
      </ion-button>
    </div>
  </div>
</ion-content>
