
<ion-header class="ion-no-border midnight-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isSelectionMode ? 'Select ' + selectedType : 'Categories' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #020617;">
  <div class="midnight-hero-bg" style="height: 200px; background: linear-gradient(to bottom, #0f172a, #020617); position: absolute; width: 100%; top: 0; left: 0; z-index: 0; overflow: hidden;">
    <div class="glow-orb orb-1" style="width: 200px; height: 200px; top: -50px; right: -50px; opacity: 0.15; background: var(--primary-purple);"></div>
  </div>

  <div class="category-content fade-up" style="position: relative; z-index: 1; padding: 20px;">
    
    <ion-segment *ngIf="!isSelectionMode" [(ngModel)]="selectedType" mode="ios" style="margin-bottom: 25px; --background: rgba(255,255,255,0.03); padding: 5px; border-radius: 20px;">
      <ion-segment-button value="expense" style="--indicator-color: var(--primary-purple); --color: #94a3b8; --color-checked: white;">
        <ion-label style="font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Expense</ion-label>
      </ion-segment-button>
      <ion-segment-button value="income" style="--indicator-color: var(--primary-purple); --color: #94a3b8; --color-checked: white;">
        <ion-label style="font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Income</ion-label>
      </ion-segment-button>
    </ion-segment>

    <ion-grid class="ion-no-padding">
      <ion-row>
        <ion-col size="6" *ngFor="let category of filteredCategories" style="padding: 10px;">
          <div class="category-card glass-card tappable" 
               (click)="openCategoryPopup(category)"
               style="height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;">
            <div class="icon-box" style="background: rgba(255,255,255,0.05); width: 52px; height: 52px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease;">
              <ion-icon [name]="category.icon" style="font-size: 1.8rem; color: var(--primary-purple);"></ion-icon>
            </div>
            <p style="margin: 0; color: white; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.2px; text-align: center; padding: 0 5px;">
              {{ category.name === 'Others' ? 'Customize' : category.name }}
            </p>
            <div class="tap-ripple"></div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
