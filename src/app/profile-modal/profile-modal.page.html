<ion-header class="ion-no-border midnight-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="exit()" color="light">
        <ion-icon name="chevron-back" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Edit Identity</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #020617;">
  <div class="midnight-hero-bg" style="height: 200px; background: linear-gradient(to bottom, #0f172a, #020617); position: absolute; width: 100%; top: 0; left: 0; z-index: 0; overflow: hidden;">
    <div class="glow-orb orb-1" style="width: 150px; height: 150px; top: -50px; right: -50px; opacity: 0.2; background: var(--primary-purple);"></div>
  </div>

  <div class="auth-content fade-up" style="padding-top: 40px; position: relative; z-index: 1;">
    <div class="avatar-section" style="text-align: center; margin-bottom: 30px;">
      <div (click)="uploadImage()" 
           style="width: 100px; height: 100px; border-radius: 35px; background: rgba(255,255,255,0.05); border: 2px solid var(--primary-purple); margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); overflow: hidden; position: relative; cursor: pointer;">
        <ion-icon *ngIf="!userProfile.profile_image" name="person" style="font-size: 3.5rem; color: var(--primary-purple);"></ion-icon>
        <img *ngIf="userProfile.profile_image" [src]="userProfile.profile_image" style="width: 100%; height: 100%; object-fit: cover;" />
        
        <!-- Hover Overlay -->
        <div style="position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.5); padding: 2px 0;">
          <ion-icon name="camera" style="color: white; font-size: 1rem;"></ion-icon>
        </div>
      </div>
      <p style="color: var(--primary-purple); font-weight: 800; margin-top: 15px; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;">Identity Verified</p>
    </div>

    <div class="glass-card" style="margin: 0 20px; padding: 30px 20px;">
      <ion-row>
        <ion-col size="6" style="padding-left: 0;">
          <ion-item lines="none" class="cyber-input">
            <ion-label position="stacked">First Name</ion-label>
            <ion-input type="text" [(ngModel)]="userProfile.first_name" placeholder="First Name"></ion-input>
          </ion-item>
        </ion-col>
        <ion-col size="6" style="padding-right: 0;">
          <ion-item lines="none" class="cyber-input">
            <ion-label position="stacked">Last Name</ion-label>
            <ion-input type="text" [(ngModel)]="userProfile.last_name" placeholder="Last Name"></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-item lines="none" class="cyber-input">
        <ion-label position="stacked">Email Address</ion-label>
        <ion-input type="email" [(ngModel)]="userProfile.email"></ion-input>
      </ion-item>
      
      <ion-item lines="none" class="cyber-input">
        <ion-label position="stacked">Contact Number</ion-label>
        <ion-input type="tel" [(ngModel)]="userProfile.phone"></ion-input>
      </ion-item>

      <ion-button expand="block" class="electric-btn" (click)="saveAndClose()" style="margin-top: 20px;">
        Synchronize Data
      </ion-button>
    </div>
  </div>
</ion-content>
