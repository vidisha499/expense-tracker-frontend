<ion-content class="purple-theme">
  <div class="profile-header-new">
    <div class="avatar-wrapper">
      <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </div>
  </div>

  <div class="glass-card">
    <ion-list lines="none">
      <ion-item class="aesthetic-item">
        <ion-icon slot="start" name="mail-outline"></ion-icon>
        <ion-label position="stacked">Email</ion-label>
        <ion-input type="email" [(ngModel)]="userProfile.email"></ion-input>
      </ion-item>
      
      <ion-item class="aesthetic-item">
        <ion-icon slot="start" name="phone-portrait-outline"></ion-icon>
        <ion-label position="stacked">Phone</ion-label>
        <ion-input type="tel" [(ngModel)]="userProfile.phone"></ion-input>
      </ion-item>
    </ion-list>
  </div>

  <div class="glass-card">
    <ion-item lines="none" class="aesthetic-item" (click)="changePassword()" button="true">
      <ion-icon slot="start" name="shield-checkmark-outline"></ion-icon>
      <ion-label>Security & Privacy</ion-label>
      <ion-icon slot="end" name="chevron-forward" size="small"></ion-icon>
    </ion-item>
  </div>

  <div class="ion-padding">
    <ion-button expand="block" class="purple-gradient-btn" (click)="saveAndClose()">
      Save Changes
    </ion-button>
  </div>
</ion-content>
